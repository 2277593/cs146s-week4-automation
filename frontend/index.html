<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>現代軟體開發入門</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0ede8; color: #1a1a1a; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Top bar ── */
    #topbar {
      display: flex; align-items: center; gap: 12px;
      background: #3d3d3d; color: #fff;
      padding: 0 20px; height: 52px; flex-shrink: 0;
      box-shadow: 0 1px 3px rgba(0,0,0,.35);
    }
    #topbar h1 { font-size: 1rem; font-weight: 600; letter-spacing: .5px; white-space: nowrap; }
    #search-form { display: flex; align-items: center; gap: 6px; flex: 1; max-width: 480px; margin-left: auto; }
    #search-q {
      flex: 1; padding: 6px 10px; border: none; border-radius: 4px;
      background: #555; color: #fff; font-size: 0.875rem; outline: none;
    }
    #search-q::placeholder { color: #aaa; }
    #search-q:focus { background: #666; }
    #topbar button {
      padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer;
      font-size: 0.8rem; background: #555; color: #ddd; transition: background .15s;
    }
    #topbar button:hover { background: #777; }
    #starred-toggle.active { background: #c8a84b; color: #fff; }

    /* ── Body layout ── */
    #layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Left sidebar ── */
    #sidebar {
      width: 280px; flex-shrink: 0;
      background: #f7f5f2; border-right: 1px solid #ddd;
      display: flex; flex-direction: column; overflow: hidden;
    }
    #sidebar-header {
      padding: 12px 14px; border-bottom: 1px solid #e0dbd4;
      display: flex; align-items: center; justify-content: space-between;
    }
    #sidebar-header span { font-size: 0.75rem; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .5px; }
    #new-note-btn {
      padding: 5px 12px; background: #00a82d; color: #fff;
      border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: 600;
    }
    #new-note-btn:hover { background: #008f26; }
    #notes { list-style: none; overflow-y: auto; flex: 1; padding: 8px 0; }
    #notes li {
      padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #ece8e2;
      transition: background .1s; position: relative;
    }
    #notes li:hover { background: #eee9e3; }
    #notes li.active { background: #dff0e8; border-left: 3px solid #00a82d; }
    .note-card-title { font-size: 0.875rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .note-card-preview { font-size: 0.75rem; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .note-star { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 0.9rem; color: #c8a84b; }

    /* ── Right panel ── */
    #panel {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
      background: #fff;
    }
    #panel-toolbar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-bottom: 1px solid #e8e4de; flex-shrink: 0;
    }
    #panel-toolbar button {
      padding: 5px 12px; border: none; border-radius: 4px; cursor: pointer;
      font-size: 0.8rem; background: #f0ede8; color: #444; transition: background .15s;
    }
    #panel-toolbar button:hover { background: #e0dbd4; }
    #btn-star-note { color: #c8a84b; }
    #btn-delete-note { color: #c0392b; }
    #panel-content { flex: 1; padding: 28px 32px; overflow-y: auto; }
    #panel-title-display { font-size: 1.6rem; font-weight: 700; margin-bottom: 16px; color: #1a1a1a; }
    #panel-body-display { font-size: 0.9375rem; line-height: 1.7; color: #333; white-space: pre-wrap; }
    #panel-empty { color: #bbb; font-size: 1rem; margin-top: 80px; text-align: center; }

    /* Edit mode */
    #panel-edit { display: none; flex-direction: column; gap: 10px; padding: 28px 32px; flex: 1; overflow-y: auto; }
    #edit-title { font-size: 1.4rem; font-weight: 700; border: none; border-bottom: 2px solid #ddd; padding: 4px 0; outline: none; width: 100%; }
    #edit-title:focus { border-bottom-color: #00a82d; }
    #edit-content { flex: 1; border: 1px solid #ddd; border-radius: 4px; padding: 12px; font-size: 0.9375rem; line-height: 1.7; resize: none; outline: none; min-height: 300px; font-family: inherit; }
    #edit-content:focus { border-color: #00a82d; }
    #edit-actions { display: flex; gap: 8px; }
    #edit-actions button { padding: 7px 18px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.875rem; font-weight: 600; }
    #btn-save { background: #00a82d; color: #fff; }
    #btn-save:hover { background: #008f26; }
    #btn-cancel { background: #f0ede8; color: #555; }
    #btn-cancel:hover { background: #e0dbd4; }

    /* ── New note form (hidden by default, shown in panel) ── */
    #note-form { display: none; }

    /* ── Action items (bottom strip of sidebar) ── */
    #actions-section {
      border-top: 1px solid #ddd; background: #f7f5f2;
      flex-shrink: 0; max-height: 240px; display: flex; flex-direction: column; overflow: hidden;
    }
    #actions-header {
      padding: 8px 14px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #e0dbd4; flex-shrink: 0;
    }
    #actions-header span { font-size: 0.75rem; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .5px; }
    #action-form { display: flex; gap: 6px; padding: 8px 14px; border-bottom: 1px solid #e0dbd4; flex-shrink: 0; }
    #action-desc { flex: 1; padding: 5px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.8rem; outline: none; }
    #action-desc:focus { border-color: #00a82d; }
    #action-form button { padding: 5px 10px; background: #00a82d; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: 600; }
    #actions { list-style: none; overflow-y: auto; flex: 1; padding: 4px 0; }
    #actions li { display: flex; align-items: center; gap: 6px; padding: 6px 14px; font-size: 0.8rem; border-bottom: 1px solid #f0ede8; }
    #actions li.done { color: #aaa; text-decoration: line-through; }
    #actions li button { margin-left: auto; padding: 2px 8px; border: none; border-radius: 3px; background: #e8f5e9; color: #2e7d32; cursor: pointer; font-size: 0.75rem; }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div id="topbar">
    <h1>📒 現代軟體開發入門</h1>
    <form id="search-form">
      <input id="search-q" placeholder="搜尋筆記..." autocomplete="off" />
      <button type="submit">搜尋</button>
      <button type="button" id="search-clear">清除</button>
      <button type="button" id="starred-toggle">★ 收藏</button>
    </form>
  </div>

  <!-- Main layout -->
  <div id="layout">

    <!-- Left sidebar -->
    <div id="sidebar">
      <div id="sidebar-header">
        <span>筆記</span>
        <button id="new-note-btn">＋ 新增</button>
      </div>
      <ul id="notes"></ul>

      <!-- Action items -->
      <div id="actions-section">
        <div id="actions-header">
          <span>待辦事項</span>
        </div>
        <form id="action-form">
          <input id="action-desc" placeholder="新增待辦..." required />
          <button type="submit">＋</button>
        </form>
        <ul id="actions"></ul>
      </div>
    </div>

    <!-- Right panel -->
    <div id="panel">
      <div id="panel-toolbar" style="display:none;">
        <button id="btn-edit-note">✏️ 編輯</button>
        <button id="btn-star-note">★ 收藏</button>
        <button id="btn-extract-note" title="提取以 ! 結尾或以 todo: 開頭的行">⚡ 提取待辦</button>
        <button id="btn-delete-note">🗑 刪除</button>
      </div>
      <div id="panel-content">
        <div id="panel-empty">← 選擇一則筆記，或點擊「新增」建立新筆記<br><br><small style="color:#ccc;font-size:0.8rem">💡 提取待辦：以 <code style="background:#eee;padding:1px 4px;border-radius:2px">!</code> 結尾或以 <code style="background:#eee;padding:1px 4px;border-radius:2px">todo:</code> 開頭的行會被提取為待辦事項</small></div>
        <div id="panel-view" style="display:none;">
          <div id="panel-title-display"></div>
          <div id="panel-body-display"></div>
        </div>
      </div>
      <div id="panel-edit">
        <input id="edit-title" placeholder="標題" />
        <textarea id="edit-content" placeholder="內容..."></textarea>
        <div id="edit-actions">
          <button id="btn-save">儲存</button>
          <button type="button" id="btn-cancel">取消</button>
        </div>
      </div>
    </div>

  </div>

  <!-- Hidden note-form kept for app.js compatibility -->
  <form id="note-form" style="display:none;">
    <input id="note-title" />
    <input id="note-content" />
    <button type="submit"></button>
  </form>

  <script src="/static/app.js"></script>
</body>
</html>
